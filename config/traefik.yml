global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  # Prometheus exposition for the monitoring stack (scraped at
  # host.docker.internal:8082/metrics — see
  # Advantage_master_program_observability/monitoring/prometheus/prometheus.yml).
  metrics:
    address: ":8082"

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

log:
  level: INFO

accessLog:
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        X-Request-ID: keep
        X-Correlation-ID: keep
        X-Causation-ID: keep
