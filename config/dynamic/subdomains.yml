http:
  routers:
    calendar-api:
      rule: "Host(`calendar.advantage.localhost`) && PathPrefix(`/api`)"
      entryPoints:
        - web
      service: calendar-api
      priority: 100
      middlewares:
        - calendar-api-strip
        - standard-headers

    calendar-ui:
      rule: "Host(`calendar.advantage.localhost`) || Host(`hub.advantage.localhost`)"
      entryPoints:
        - web
      service: calendar-ui
      priority: 10
      middlewares:
        - standard-headers

    identity-admin:
      rule: "Host(`identity.advantage.localhost`) && PathPrefix(`/admin`)"
      entryPoints:
        - web
      service: identity-admin
      priority: 100
      middlewares:
        - identity-admin-trailing-slash
        - standard-headers

    identity-api:
      rule: "Host(`identity.advantage.localhost`) && PathPrefix(`/api/identity`)"
      entryPoints:
        - web
      service: identity-logic
      priority: 90
      middlewares:
        - identity-api-strip
        - standard-headers

    identity-audit-api:
      rule: "Host(`identity.advantage.localhost`) && PathPrefix(`/api/audit`)"
      entryPoints:
        - web
      service: audit-service
      priority: 95
      middlewares:
        - audit-api-strip
        - standard-headers

    identity:
      rule: "Host(`identity.advantage.localhost`)"
      entryPoints:
        - web
      service: identity
      priority: 10
      middlewares:
        - standard-headers

    sales-api:
      rule: "Host(`sales.advantage.localhost`) && PathPrefix(`/api/sales`)"
      entryPoints:
        - web
      service: sales-api
      priority: 100
      middlewares:
        - standard-headers

    sales-ui:
      rule: "Host(`sales.advantage.localhost`)"
      entryPoints:
        - web
      service: sales-ui
      priority: 10
      middlewares:
        - standard-headers

    forwarding:
      rule: "Host(`forwarding.advantage.localhost`)"
      entryPoints:
        - web
      service: forwarding
      middlewares:
        - standard-headers

    fleet:
      rule: "Host(`fleet.advantage.localhost`)"
      entryPoints:
        - web
      service: fleet
      middlewares:
        - standard-headers

  services:
    calendar-ui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:5174"

    calendar-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:8010"

    identity:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:18101"

    identity-admin:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:5182"

    identity-logic:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:18106"

    audit-service:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:18005"

    sales-ui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:5175"

    sales-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:18080"

    forwarding:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:5180"

    fleet:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://host.docker.internal:5181"

  middlewares:
    standard-headers:
      # Stamps the gateway as the last hop for observability and adds a
      # `X-Forwarded-Gateway` request header so backends can tell traffic
      # that came through Traefik apart from direct dev hits.
      # Backends mint X-Request-ID / X-Correlation-ID via their
      # ObservabilityMiddleware when the client did not send one — Traefik
      # does not yet provide a built-in "only-if-missing" header writer.
      # Documented contract:
      #   * Clients SHOULD send X-Request-ID / X-Correlation-ID / X-Causation-ID.
      #   * Gateway preserves them through to upstreams (passHostHeader).
      #   * Backends mint them if absent (advantage_observability).
      headers:
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customRequestHeaders:
          X-Forwarded-Gateway: "advantage-program-gateway"
        customResponseHeaders:
          X-Gateway: "advantage-program-gateway"

    identity-admin-trailing-slash:
      # Identity's admin SPA (Vite) is served only at its configured base
      # "/admin/". A bare "/admin" — e.g. cross-app launcher links from Sales,
      # Identity itself, bookmarks, or a typed URL — makes Vite reject the
      # request with "The server is configured with a public base URL of /admin/
      # — did you mean to visit /admin/ instead?". Rather than fix the trailing
      # slash in every service's launcher href, normalise it once here at the
      # edge so every current and future entry point resolves.
      redirectRegex:
        regex: "^(https?://[^/]+)/admin$"
        replacement: "${1}/admin/"
        permanent: false

    identity-api-strip:
      stripPrefix:
        prefixes:
          - "/api/identity"

    audit-api-strip:
      stripPrefix:
        prefixes:
          - "/api/audit"

    calendar-api-strip:
      stripPrefix:
        prefixes:
          - "/api"
